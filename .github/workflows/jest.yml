name: Jest

on:
  # Run tests on PRs to verify code doesn't break before merge
  pull_request:
    types: [opened, synchronize]
    # Your production branch. If not the default, update here and set Target Branch at https://gitauto.ai/settings/rules to match
    branches: [master]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'jest.config.cts'
      - 'jest.preset.js'
      - 'tsconfig*.json'
  # Run tests after merge and collect coverage as canonical source of truth
  push:
    # Your production branch. If not the default, update here and set Target Branch at https://gitauto.ai/settings/rules to match
    branches: [master]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'jest.config.cts'
      - 'jest.preset.js'
      - 'tsconfig*.json'
  # Allow manual trigger for debugging
  workflow_dispatch:

# Cancel older runs when new commits are pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup dev tools with mise
        uses: jdx/mise-action@v2

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm nx run-many -t test --parallel=3
          else
            pnpm nx run-many -t test --parallel=3 --coverage --coverageReporters=lcov --coverageDirectory=coverage
          fi

      - name: Upload coverage report
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
